version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      mcp-core:
        patterns:
          - "mcp"
      astro-stack:
        patterns:
          - "pysweph"
          - "numpy"
          - "matplotlib"
      utilities:
        patterns:
          - "python-dateutil"
          - "sqlalchemy"
          - "timezonefinder"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
